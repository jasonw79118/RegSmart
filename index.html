<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RegSmart</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login" class="login">
  <h1>RegSmart Login</h1>
  <button onclick="login()">Sign In</button>
</div>

<div id="app" class="app hidden">
  <aside class="sidebar">
    <h2>RegSmart</h2>
    <nav>
      <div>Dashboard</div>
      <div>Issues</div>
      <div>Audits</div>
      <div>Administration</div>
      <div>Help</div>
    </nav>
    <div class="version">04.06.2026.0010</div>
  </aside>

  <main>
    <header>
      <h1>Dashboard</h1>
      <button onclick="logout()">Sign Out</button>
    </header>

    <section>
      <h2>System Overview</h2>
      <p>This confirms login + admin UI is restored.</p>
    </section>

    <section>
      <h2>Administration</h2>
      <p>Admin menu restored successfully.</p>
    </section>

    <section>
      <h2>Help / User Guide</h2>
      <p>This system tracks issues, audits, and compliance workflows.</p>
    </section>
  </main>
</div>

<script>
function login(){
  localStorage.setItem("loggedIn","true");
  render();
}
function logout(){
  localStorage.removeItem("loggedIn");
  render();
}
function render(){
  const logged = localStorage.getItem("loggedIn")==="true";
  document.getElementById("login").classList.toggle("hidden",logged);
  document.getElementById("app").classList.toggle("hidden",!logged);
}
render();
</script>

</body>
</html>
